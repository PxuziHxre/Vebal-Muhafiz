name: Vebal Muhafiz Calistir
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Node.js Kur
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Modulleri Yukle
        run: npm install
      - name: Botu Baslat
        run: node index.js
        
